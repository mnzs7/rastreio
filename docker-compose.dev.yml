version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rastreio_postgres_dev
    environment:
      POSTGRES_USER: rastreio
      POSTGRES_PASSWORD: rastreio123
      POSTGRES_DB: rastreio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rastreio -d rastreio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
